<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebPage</title>
     <script src="https://cdn.tailwindcss.com"></script>
     <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="main-container ">
 <div class="bg-white p-12 rounded-xl shadow-lg max-w-md ">
        <h1 class="text-2xl font-bold mb-6 text-indigo-700">User Portal</h1>

        <form id="userForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium">Full Name</label>
                <input type="text" id="userName" required class="w-full border p-2 rounded">
            </div>
            <div>
                <label class="block text-sm font-medium">Age</label>
                <input type="number" id="userAge" required class="w-full border p-2 rounded">
            </div>
            <button type="submit" class="w-full bg-indigo-600 text-white py-2 rounded hover:bg-yellow-500">
                Save & Update
            </button>
        </form>

        <div id="resultSection" class="hidden mt-8 border-t pt-6 space-y-4">
            <h2 id="greeting" class="text-xl font-semibold"></h2>
            <p id="monthsDisplay" class="text-gray-600"></p>
            <p id="ageStatus" class="font-bold"></p>
            
            <div id="quoteContainer" class="bg-indigo-50 p-4 rounded italic text-sm text-indigo-900">
                </div>
        </div>
    </div>
    </main>
    </form>



    <script src="script.js"></script>
</body>
</html>
